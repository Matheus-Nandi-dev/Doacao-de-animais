<div class="dashboard">
  <h1>📊 Dashboard Administrativo</h1>
  
  <div class="stats-grid">
    <div class="stat-card" *ngFor="let stat of stats">
      <div class="stat-icone">{{ stat.icone }}</div>
      <div class="stat-info">
        <h3>{{ stat.label }}</h3>
        <p class="stat-valor">{{ stat.valor }}</p>
      </div>
    </div>
  </div>

  <div class="welcome-message">
    <h2>Bem-vindo ao Painel de Administração</h2>
    <p>Use o menu lateral para gerenciar doadores, adotantes, cidades e visualizar adoções.</p>
  </div>
</div>
