<div class="admin-panel">
  <div class="panel-header">
    <h1>🏙️ Gerenciar Cidades</h1>
    <button class="btn-novo" (click)="abrirFormulario()">+ Nova Cidade</button>
  </div>

  <!-- Formulário -->
  <div class="formulario-container" *ngIf="formularioVisivel">
    <div class="formulario">
      <h2>{{ editando ? 'Editar Cidade' : 'Nova Cidade' }}</h2>
      
      <div class="form-row">
        <div class="form-group">
          <label>Nome da Cidade:</label>
          <input type="text" [(ngModel)]="novaCidade.nome" placeholder="Ex: Toledo">
        </div>
        <div class="form-group">
          <label>Estado (UF):</label>
          <input type="text" [(ngModel)]="novaCidade.estado" placeholder="PR" maxlength="2">
        </div>
      </div>

      <div class="form-group">
        <label>População:</label>
        <input type="number" [(ngModel)]="novaCidade.populacao" placeholder="130000">
      </div>

      <div class="form-actions">
        <button class="btn-salvar" (click)="adicionarCidade()">Salvar</button>
        <button class="btn-cancelar" (click)="fecharFormulario()">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- Tabela de Cidades -->
  <div class="tabela-container">
    <table class="tabela">
      <thead>
        <tr>
          <th>Cidade</th>
          <th>Estado</th>
          <th>População</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let cidade of cidades">
          <td class="nome">{{ cidade.nome }}</td>
          <td class="center">{{ cidade.estado }}</td>
          <td class="center">{{ cidade.populacao | number }}</td>
          <td class="acoes">
            <button class="btn-editar" (click)="editarCidade(cidade)">✏️ Editar</button>
            <button class="btn-deletar" (click)="deletarCidade(cidade.id)">🗑️ Deletar</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="vazio" *ngIf="cidades.length === 0">
    <p>Nenhuma cidade cadastrada. <a href="#" (click)="abrirFormulario(); $event.preventDefault()">Cadastre uma nova!</a></p>
  </div>
</div>
